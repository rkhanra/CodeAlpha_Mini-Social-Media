<!DOCTYPE html>
<html>
<head>
  <title>Login - Mini Social App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <div class="logo">MiniSocial</div>

  <div class="nav-links">
    <button onclick="goHome()">Home</button>
    <button onclick="goSignup()">Signup</button>
  </div>
</div>

<!-- ================= LOGIN BOX ================= -->
<div class="auth-container">

  <div class="auth-card">
    <h2>Welcome Back 👋</h2>

    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />

    <button class="primary-btn" onclick="login()">Login</button>

    <p class="switch-text">
      Don't have an account?
      <span onclick="goSignup()">Create one</span>
    </p>

    <p id="msg"></p>
  </div>

</div>

<script>
const API = "http://localhost:5000";

// ================= NAVIGATION =================
function goHome() {
  window.location.href = "index.html";
}

function goSignup() {
  window.location.href = "signup.html";
}

// ================= LOGIN =================
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "Logging in...";

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = data.error || "Login failed";
      return;
    }

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "feed.html";
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "Server not reachable";
  }
}
</script>

</body>
</html>
